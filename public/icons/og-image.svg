<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Deep Shah — AI Engineer & Automation Expert">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#16161f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="80" y="200" fill="#22d3ee" font-size="22" font-weight="600" letter-spacing="6">AI ENGINEER · AUTOMATION EXPERT</text>
    <text x="80" y="340" fill="#f8fafc" font-size="92" font-weight="700" letter-spacing="-2">Deep Shah</text>
    <text x="80" y="420" fill="url(#text)" font-size="56" font-weight="700" letter-spacing="-1">Building intelligent products that ship.</text>
    <text x="80" y="540" fill="#94a3b8" font-size="22">deepshah.tech</text>
  </g>
  <g transform="translate(960,180)">
    <rect width="160" height="160" rx="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
    <text x="80" y="105" text-anchor="middle" fill="url(#text)" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="64">DS</text>
  </g>
